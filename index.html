<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FYBE | Fidelity Yield Blockchain Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* HERO SECTION */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100svh; /* 모바일 브라우저 주소창 대응 */
      overflow: hidden;
      background: #000;
    }

    /* VIDEO WRAPPER */
    .video-wrapper {
      position: absolute;
      left: 50%;
      top: 45%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .video-wrapper.visible { opacity: 1; }

    .hero-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.1) brightness(0.9);
    }

    /* LABELS & ACCENTS */
    .corner-label {
      position: absolute;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      z-index: 10;
    }

    /* Mobile Responsive Labels */
    @media (max-width: 768px) {
      .corner-label-bl { bottom: 38vh; left: 20px; font-size: 0.55rem; }
      .corner-label-br { bottom: 38vh; right: 20px; font-size: 0.55rem; }
      .star-accent { right: 20px !important; top: 10% !important; }
    }
    @media (min-width: 769px) {
      .corner-label-bl { bottom: calc(35vh + 20px); left: 40px; }
      .corner-label-br { bottom: calc(35vh + 20px); right: 40px; }
    }

    .star-accent {
      position: absolute;
      top: 50%;
      right: 40px;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.2);
      font-size: 1rem;
      animation: star-spin 15s linear infinite;
      z-index: 5;
    }

    @keyframes star-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* MARQUEE (BOTTOM SECTION) */
    .marquee-section {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #000;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .marquee-label {
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 20px;
      padding: 0 40px;
    }

    .marquee-track {
      display: flex;
      width: max-content;
      animation: marquee-scroll 30s linear infinite;
    }

    @keyframes marquee-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .marquee-item {
      padding: 0 30px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    /* MOBILE OPTIMIZATION */
    @media (max-width: 480px) {
      .marquee-item { font-size: 1.1rem; padding: 0 20px; }
      .video-wrapper { height: 60vh; top: 40%; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="video-wrapper" id="videoWrapper">
      <video id="heroVideo" class="hero-video" muted autoplay loop playsinline></video>
    </div>

    <span class="corner-label corner-label-bl">Forefront Yield & Blockchain Engineering</span>
    <span class="corner-label corner-label-br">Est. 2025</span>
    <div class="star-accent">✳</div>

    <div class="marquee-section">
      <p class="marquee-label">Core Protocol Infrastructure</p>
      <div class="marquee-track">
        <div class="marquee-item">FYBE</div>
        <div class="marquee-item">FIDELITY YIELD</div>
        <div class="marquee-item">BLOCKCHAIN ENGINE</div>
        <div class="marquee-item">ALGORITHMIC ALPHA</div>
        <div class="marquee-item">YIELD INTELLIGENCE</div>
        <div class="marquee-item">FYBE</div>
        <div class="marquee-item">FIDELITY YIELD</div>
        <div class="marquee-item">BLOCKCHAIN ENGINE</div>
        <div class="marquee-item">ALGORITHMIC ALPHA</div>
        <div class="marquee-item">YIELD INTELLIGENCE</div>
      </div>
    </div>
  </section>

  <script>
    const VIDEO_SRC = 'https://stream.mux.com/9JXDljEVWYwWu01PUkAemafDugK89o01BR6zqJ3aS9u00A.m3u8';
    const video = document.getElementById('heroVideo');
    const wrapper = document.getElementById('videoWrapper');

    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(VIDEO_SRC);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play();
        wrapper.classList.add('visible');
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = VIDEO_SRC;
      video.addEventListener('loadedmetadata', () => {
        video.play();
        wrapper.classList.add('visible');
      });
    }
  </script>
</body>
</html>
